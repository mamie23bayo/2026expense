<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bayo Bowls - Receipt Images</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Open Sans', sans-serif; color: #212121; background: #f7f7f5; }
    .display { font-family: 'Cormorant Garamond', serif; font-weight: 300; }
    .label-sm { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; color: #8b8b8b; }
    .card { background: #fff; border: 1px solid #e5e5e5; }
    .form-input { border: 1px solid #e5e5e5; padding: 11px 14px; font-size: 13px; width: 100%; outline: none; }
    .form-input:focus { border-color: #29925a; }
    .btn { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; padding: 12px 18px; cursor: pointer; border: 1px solid #212121; background: transparent; color: #212121; text-decoration: none; }
    .btn:hover { background: #212121; color: #fff; }
    .divider { width: 32px; height: 2px; background: #29925a; }
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; }
  </style>
</head>
<body>
  <header style="background:#fff; border-bottom:1px solid #e5e5e5;">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-3">
      <div>
        <div class="display text-xl">Bayo Bowls</div>
        <div class="label-sm" style="color:#29925a;">Receipt Images</div>
      </div>
      <a href="index.html" class="btn">Back To Dashboard</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
    <div class="card p-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between" style="gap:16px;">
        <div>
          <div class="label-sm mb-1">All Receipt Photos</div>
          <div class="divider mb-2"></div>
          <div style="font-size:12px; color:#8b8b8b;">Search by restaurant name or receipt date.</div>
        </div>
        <input id="gallery-search" class="form-input" style="max-width:260px;" placeholder="Search..." oninput="renderImages()" />
      </div>
      <div id="images-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap:12px; margin-top:18px;"></div>
    </div>
  </main>

  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Receipt" />
  </div>

  <script src="images.js"></script>
</body>
</html>
