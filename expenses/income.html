<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bayo Bowls - Income Entry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Open Sans', sans-serif; color: #212121; background: #f7f7f5; }
    .display { font-family: 'Cormorant Garamond', serif; font-weight: 300; }
    .label-sm { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; color: #8b8b8b; }
    .card { background: #fff; border: 1px solid #e5e5e5; }
    .form-input { border: 1px solid #e5e5e5; padding: 11px 14px; font-size: 13px; width: 100%; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: #29925a; }
    .form-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; color: #8b8b8b; display: block; margin-bottom: 6px; }
    .btn { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; padding: 12px 18px; cursor: pointer; border: none; }
    .btn-green { background: #29925a; color: #fff; }
    .btn-green:hover { background: #1f7347; }
    .btn-outline { border: 1px solid #212121; background: transparent; color: #212121; text-decoration: none; }
    .btn-outline:hover { background: #212121; color: #fff; }
    .divider { width: 32px; height: 2px; background: #29925a; }
    #toast { position: fixed; bottom: 24px; right: 24px; background: #212121; color: #fff; padding: 12px 20px; font-size: 11px; letter-spacing: 1px; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
    #toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <header style="background:#fff; border-bottom:1px solid #e5e5e5;">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-3">
      <div>
        <div class="display text-xl">Bayo Bowls</div>
        <div class="label-sm" style="color:#29925a;">Income Entry</div>
      </div>
      <a href="index.html" class="btn btn-outline">Back To Dashboard</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 sm:px-6 py-8">
    <div class="card p-8">
      <div class="label-sm mb-1">Record Monthly Income</div>
      <div class="divider mb-6"></div>

      <div class="mb-4">
        <label class="form-label">Source</label>
        <select id="inc-source" class="form-input">
          <option value="">Select source...</option>
          <option>Farmers Market</option>
          <option>Online Orders</option>
          <option>Catering</option>
          <option>Chefs</option>
          <option>Other</option>
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label">Amount ($)</label>
        <input type="number" id="inc-amount" class="form-input" placeholder="0.00" step="0.01" min="0" />
      </div>
      <div class="mb-4">
        <label class="form-label">Date</label>
        <input type="date" id="inc-date" class="form-input" />
      </div>
      <div class="mb-6">
        <label class="form-label">Notes (optional)</label>
        <textarea id="inc-notes" class="form-input" rows="3" placeholder="e.g. May market payout"></textarea>
      </div>

      <button onclick="saveIncomeOnly()" class="btn btn-green w-full">Save Income</button>
    </div>
  </main>

  <div id="toast"></div>
  <script src="income.js"></script>
</body>
</html>
